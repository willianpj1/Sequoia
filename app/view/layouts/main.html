<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{appName}}{% endblock %}</title>

    {% include "partial/css.html" %}
    {% block styles %}{% endblock %}
</head>

<body>
    <main class="container-fluid">
        <!--Cria um bloca para o menu da aplicação -->
        <div class="row">
            {% block menu %}{% endblock %}
        </div>
        <!--Criar um bloco para o conteúdo da aplicação-->
        <div class="row">
            {% block content %}{% endblock %}
        </div>
    </main>
    {% include "partial/script.html" %}
    {% block scripts %}{% endblock %}
</body>

</html>
