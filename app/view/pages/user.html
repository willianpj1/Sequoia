{% extends "layouts/main.html" %}

{% block title %}Novo Cliente{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2>Cadastro de Usuario</h2>
    </div>
</div>
<form id="form">
    <input type="hidden" id="id" name="id">
    <input type="hidden" id="action" name="action">
    <div class="row">
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nome" name="nome" placeholder="Digite o nome" autofocus>
                <label for="nome">Nome do Usuario</label>
            </div>
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="sobrenome" name="sobrenome" placeholder="Digite o sobrenome" autofocus>
                <label for="sobrenome">Sobrenome do Usuario</label>
            </div>
        </div>
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="cpf" name="cpf" placeholder="Digite o CPF" autofocus>
                <label for="cpf">CPF do Usuario</label>
            </div>
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="rg" name="rg" placeholder="Digite o RG" autofocus>
                <label for="rg">RG do Usuario</label>
            </div>
        </div>
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="senha" name="senha" placeholder="Digite a senha"
                    autofocus>
                <label for="senha">Senha do Usuario</label>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="ativo" id="ativo" value="true">
                <label class="form-check-label" for="ativo">
                    Ativo?
                </label>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <button type="button" class="btn btn-outline-success" id="insert">
                <i class="fa-solid fa-floppy-disk"></i>
                Salvar
            </button>
        </div>
    </div>
</form>

{% endblock %}

{% block scripts %}
<script src="file:///{{ assets }}/js/users.js"></script>
{% endblock %}
