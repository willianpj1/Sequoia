{% extends "layouts/main.html" %}

{% block title %}Produtos{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="fa-solid fa-box fa-lg text-success"></i>
            <h4 class="mb-0 fw-semibold">Produtos</h4>
        </div>
        <button class="btn btn-success px-4"
            onclick="api.window.open('pages/products', { width: 800, height: 600, title: 'Cadastrar Produto' })">
            <i class="fa-solid fa-plus me-2"></i>Novo Produto
        </button>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-3">
            <table id="table-products" class="table table-striped table-hover table-bordered align-middle mb-0" style="width: 100%;">
                <thead class="table-dark">
                    <tr>
                        <th class="text-center" style="width: 60px;">#</th>
                        <th><i class="fa-solid fa-box me-1"></i>Nome</th>
                        <th><i class="fa-solid fa-barcode me-1"></i>Cód. Barras</th>
                        <th class="text-center">Unidade</th>
                        <th class="text-end">Preço Compra</th>
                        <th class="text-end">Preço Venda</th>
                        <th class="text-center" style="width: 100px;">Status</th>
                        <th class="text-center" style="width: 160px;">Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="file:///{{ assets }}/js/listaproduct.js"></script>
{% endblock %}
