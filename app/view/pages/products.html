{% extends "layouts/main.html" %}

{% block title %}Novo Produto{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2>Cadastro de Produto</h2>
    </div>
</div>
<form id="form">
    <input type="hidden" id="id" name="id">
    <input type="hidden" id="action" name="action">
    <div class="row">
        <div class="col-8">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nome" name="nome" placeholder="example" autofocus>
                <label for="nome">Nome do produto</label>
            </div>
        </div>
        <div class="col-4">
            <div class="form-floating mb-4">
                <input type="text" class="form-control" id="codigo_barra" name="codigo_barra" placeholder="example">
                <label for="codigo_barra">Código de barras do produto</label>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-4">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="preco_compra" name="preco_compra" placeholder="example">
                <label for="preco_compra">Preço de compra</label>
            </div>
        </div>
        <div class="col-4">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="preco_venda" name="preco_venda" placeholder="example">
                <label for="preco_venda">Preço de venda</label>
            </div>
        </div>
        <div class="col-2">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="unidade" name="unidade" placeholder="example">
                <label for="unidade">Unidade do produto</label>
            </div>
        </div>
        <div class="col-2 d-flex align-items-center">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" role="switch" id="ativo" name="ativo" checked>
                <label class="form-check-label" for="ativo">Produto ativo?</label>
            </div>
        </div>
    </div>

    <!-- Seção de impostos e margens -->
    <div class="row">
        <div class="col-12 mb-2">
            <h5 class="text-muted">Impostos e Margens</h5>
            <hr class="mt-0">
        </div>
    </div>
    <div class="row">
        <div class="col-4">
            <div class="form-floating mb-3">
                <input type="number" class="form-control" id="total_imposto" name="total_imposto"
                    placeholder="0" min="0" max="99" step="0.01">
                <label for="total_imposto">Total de impostos (%)</label>
            </div>
        </div>
        <div class="col-4">
            <div class="form-floating mb-3">
                <input type="number" class="form-control" id="margem_lucro" name="margem_lucro"
                    placeholder="0" min="0" max="99" step="0.01">
                <label for="margem_lucro">Margem de lucro (%)</label>
            </div>
        </div>
        <div class="col-4">
            <div class="form-floating mb-3">
                <input type="number" class="form-control" id="custo_operacional" name="custo_operacional"
                    placeholder="0" min="0" max="99" step="0.01">
                <label for="custo_operacional">Custo operacional (%)</label>
            </div>
        </div>
    </div>

    <!-- Seção de resultados calculados (somente leitura) -->
    <div class="row">
        <div class="col-12 mb-2">
            <h5 class="text-muted">Valores Calculados</h5>
            <hr class="mt-0">
        </div>
    </div>
    <div class="row">
        <div class="col-4">
            <div class="form-floating mb-3">
                <input type="text" class="form-control bg-light" id="valor_venda_sugerido"
                    name="valor_venda_sugerido" placeholder="0,00" readonly>
                <label for="valor_venda_sugerido">Preço de venda sugerido (R$)</label>
            </div>
        </div>
        <div class="col-4">
            <div class="form-floating mb-3">
                <input type="text" class="form-control bg-light" id="valor_total_imposto"
                    name="valor_total_imposto" placeholder="0,00" readonly>
                <label for="valor_total_imposto">Valor total de impostos (R$)</label>
            </div>
        </div>
        <div class="col-4">
            <div class="form-floating mb-3">
                <input type="text" class="form-control bg-light" id="valor_margem_lucro"
                    name="valor_margem_lucro" placeholder="0,00" readonly>
                <label for="valor_margem_lucro">Valor da margem de lucro (R$)</label>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="form-floating">
                <textarea class="form-control" placeholder="Leave a comment here" id="descricao" name="descricao"
                    style="height: 100px"></textarea>
                <label for="descricao">Descrição do produto</label>
            </div>
        </div>
    </div>
    <div class="row mt-2">
        <div class="col-12 mt-2">
            <button type="button" class="btn btn-outline-primary" id="calcular">
                <i class="fa-solid fa-calculator"></i>
                Calcular
            </button>
            <button type="button" class="btn btn-outline-success" id="insert">
                <i class="fa-solid fa-floppy-disk"></i>
                Salvar
            </button>
        </div>
    </div>
</form>

{% endblock %}

{% block scripts %}
<script src="file:///{{ assets }}/js/products.js"></script>
{% endblock %}
