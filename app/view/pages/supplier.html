{% extends "layouts/main.html" %}
{% block title %}{{ action == 'edit' and 'Editar Fornecedor' or 'Novo Fornecedor' }}{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center gap-2 mb-4">
        <i class="fa-solid fa-truck fa-lg text-primary"></i>
        <h4 class="mb-0 fw-semibold">{{ action == 'edit' and 'Editar Fornecedor' or 'Novo Fornecedor' }}</h4>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form id="form">
                <input type="hidden" id="id" name="id">
                <input type="hidden" id="action" name="action">
                <div class="row g-3 mb-3">
                    <div class="col-12">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="nome" name="nome" placeholder="Nome" autofocus>
                            <label for="nome"><i class="fa-solid fa-building me-1"></i>Nome do Fornecedor</label>
                        </div>
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="cnpj" name="cnpj" placeholder="CNPJ">
                            <label for="cnpj"><i class="fa-solid fa-file-invoice me-1"></i>CNPJ</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="telefone" name="telefone" placeholder="Telefone">
                            <label for="telefone"><i class="fa-solid fa-phone me-1"></i>Telefone</label>
                        </div>
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-12">
                        <div class="form-floating">
                            <input type="email" class="form-control" id="email" name="email" placeholder="Email">
                            <label for="email"><i class="fa-solid fa-envelope me-1"></i>Email</label>
                        </div>
                    </div>
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="ativo" id="ativo" value="true" checked>
                            <label class="form-check-label fw-medium" for="ativo">Fornecedor Ativo</label>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-primary px-4" id="insert">
                        <i class="fa-solid fa-floppy-disk me-2"></i>Salvar
                    </button>
                    <button type="button" class="btn btn-outline-secondary px-4" onclick="window.close()">
                        <i class="fa-solid fa-xmark me-2"></i>Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="file:///{{ assets }}/js/supplier.js"></script>
{% endblock %}
